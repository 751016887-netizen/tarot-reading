<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>零点塔罗</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Cinzel:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #0a0a12;
            --gold-primary: #d4b896;
            --gold-light: #e8d4b8;
            --text-primary: #f0ebe3;
            --text-secondary: rgba(240, 235, 227, 0.7);
            --text-muted: rgba(240, 235, 227, 0.35);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Noto Serif SC', -apple-system, sans-serif;
            background: var(--bg-deep);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
            line-height: 1.7;
            padding-top: 140px;
        }

        .bg-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            background: radial-gradient(ellipse at 30% 20%, rgba(60, 50, 90, 0.12) 0%, transparent 40%),
                        radial-gradient(ellipse at 70% 80%, rgba(139, 115, 85, 0.08) 0%, transparent 35%);
        }

        .container {
            position: relative;
            z-index: 1;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 0 16px;
        }

        .header {
            padding: 20px 0 15px;
            text-align: center;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to bottom, var(--bg-deep) 90%, transparent);
            z-index: 1000;
        }

        .logo {
            font-family: 'Cinzel', serif;
            font-size: 1.6rem;
            font-weight: 500;
            letter-spacing: 0.15em;
            color: var(--gold-primary);
            text-shadow: 0 0 30px rgba(212, 184, 150, 0.25);
            cursor: pointer;
            transition: opacity 0.3s;
            user-select: none;
        }

        .logo:hover {
            opacity: 0.8;
        }

        .tagline {
            font-size: 0.6rem;
            color: #c4b898;
            letter-spacing: 0.3em;
            margin-top: 2px;
        }

        .input-section { padding: 25px 0; display: none; }
        .input-section.active { display: block; animation: fadeIn 0.5s ease; }

        .input-wrapper {
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(212, 184, 150, 0.12);
            border-radius: 16px;
            padding: 4px;
        }

        .input-label {
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-bottom: 12px;
            text-align: center;
            font-family: 'Cormorant Garamond', serif;
        }
        
        .daily-limit-info {
            font-size: 0.75rem;
            color: #d4b896;
            text-align: center;
            margin-bottom: 12px;
            padding: 8px 16px;
            background: rgba(212, 184, 150, 0.08);
            border-radius: 20px;
            display: inline-block;
        }

        .question-input {
            width: 100%;
            padding: 16px 18px;
            background: rgba(10, 10, 18, 0.5);
            border: none;
            border-radius: 12px;
            color: var(--text-primary);
            font-family: inherit;
            font-size: 0.95rem;
            resize: none;
        }

        .question-input:focus { outline: none; }
        .question-input::placeholder { color: var(--text-muted); }

        .btn-primary {
            width: 100%;
            margin-top: 18px;
            padding: 15px;
            background: linear-gradient(135deg, rgba(212, 184, 150, 0.12), rgba(212, 184, 150, 0.06));
            border: 1px solid var(--gold-primary);
            border-radius: 50px;
            color: var(--gold-light);
            font-family: 'Cinzel', serif;
            font-size: 0.9rem;
            letter-spacing: 0.15em;
            cursor: pointer;
            transition: all 0.35s ease;
        }

        .btn-primary:hover {
            background: linear-gradient(135deg, rgba(212, 184, 150, 0.22), rgba(212, 184, 150, 0.12));
            box-shadow: 0 0 40px rgba(212, 184, 150, 0.15);
        }

        .draw-section { flex: 1; display: none; flex-direction: column; }
        .draw-section.active { display: flex; }

        .draw-header {
            text-align: center;
            padding: 15px 0 12px;
            position: sticky;
            top: 85px;
            background: linear-gradient(to bottom, var(--bg-deep) 50%, transparent);
            z-index: 100;
        }

        .draw-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .draw-hint { font-size: 0.75rem; color: #e5d8c8; margin-top: 4px; }

        .card-grid {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
            padding: 10px 0 20px;
            display: flex;
            justify-content: center;
        }

        .card-grid::-webkit-scrollbar { width: 3px; }
        .card-grid::-webkit-scrollbar-track { background: rgba(212, 184, 150, 0.05); }
        .card-grid::-webkit-scrollbar-thumb { background: rgba(212, 184, 150, 0.25); border-radius: 2px; }

        .cards-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            max-width: 400px;
            width: 100%;
            padding: 0 8px;
        }

        @media (min-width: 600px) {
            .cards-container { grid-template-columns: repeat(4, 1fr); max-width: 700px; gap: 15px; }
        }
        @media (min-width: 900px) {
            .cards-container { grid-template-columns: repeat(5, 1fr); max-width: 900px; }
        }
        
        @media (max-width: 480px) {
            body { padding-top: 120px; }
            .header { padding: 15px 0 10px; }
            .logo { font-size: 1.4rem; }
            .tagline { font-size: 0.55rem; }
        }

        .tarot-card {
            aspect-ratio: 2/3;
            perspective: 1000px;
            cursor: pointer;
            position: relative;
        }

        .tarot-card::after {
            content: '';
            position: absolute;
            top: -4px;
            right: -4px;
            width: 22px;
            height: 22px;
            background: linear-gradient(135deg, #f5e6c8, #d4b896);
            border-radius: 50%;
            opacity: 0;
            transform: scale(0.5);
            transition: all 0.3s ease;
            z-index: 5;
            box-shadow: 0 2px 10px rgba(212, 184, 150, 0.4);
        }

        .tarot-card.selected::after { opacity: 1; transform: scale(1); }

        .tarot-card-inner {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .tarot-card.flipped .tarot-card-inner { transform: rotateY(180deg); }

        .card-side {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 6px 25px rgba(0, 0, 0, 0.4);
        }

        .card-back { background: linear-gradient(145deg, #0d0a18, #080612); }
        .card-back svg { width: 100%; height: 100%; }

        .card-front { background: linear-gradient(180deg, #faf6ed, #f0ebe0); transform: rotateY(180deg); }
        .card-front svg { width: 100%; height: 100%; }

        .selected-bar {
            padding: 15px 0 25px;
            display: none;
            position: sticky;
            bottom: 0;
            background: linear-gradient(to top, var(--bg-deep) 80%, transparent);
        }

        .selected-bar.active { display: block; }

        .selected-info {
            text-align: center;
            margin-bottom: 12px;
            font-family: 'Cormorant Garamond', serif;
            font-size: 0.85rem;
            color: #e5d8c8;
        }

        .selected-info span { color: var(--gold-primary); font-weight: 600; }

        .selected-cards-row {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 15px;
        }

        .selected-mini {
            width: 55px;
            height: 82px;
            border-radius: 6px;
            overflow: hidden;
            border: 1px solid rgba(212, 184, 150, 0.3);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        .selected-mini svg { width: 100%; height: 100%; }

        .btn-draw {
            display: block;
            width: 100%;
            max-width: 280px;
            margin: 0 auto;
            padding: 14px;
            background: linear-gradient(135deg, var(--gold-primary), #8b7355);
            border: none;
            border-radius: 50px;
            color: #0a0a12;
            font-family: 'Cinzel', serif;
            font-size: 0.9rem;
            font-weight: 500;
            letter-spacing: 0.1em;
            cursor: pointer;
            transition: all 0.35s ease;
            box-shadow: 0 6px 25px rgba(212, 184, 150, 0.2);
        }

        .btn-draw:disabled { opacity: 0.35; cursor: not-allowed; box-shadow: none; }
        .btn-draw:not(:disabled):hover { transform: translateY(-2px); box-shadow: 0 10px 35px rgba(212, 184, 150, 0.35); }

        .reading-section { display: none; padding: 30px 0 50px; }
        .reading-section.active { display: block; animation: fadeIn 0.6s ease; }
        
        /* AI 解读区域 */
        .ai-reading-section { display: none; padding: 30px 0 50px; }
        .ai-reading-section.active { display: block; animation: fadeIn 0.6s ease; }
        
        .ai-reading-title {
            font-family: 'Cinzel', serif;
            font-size: 1.4rem;
            text-align: center;
            color: var(--gold-light);
            letter-spacing: 0.12em;
            margin-bottom: 8px;
        }
        
        .ai-reading-question { font-size: 0.8rem; color: var(--text-muted); text-align: center; margin-bottom: 25px; }
        
        .ai-reading-content {
            background: linear-gradient(180deg, rgba(255,255,255,0.025), rgba(255,255,255,0.015));
            border: 1px solid rgba(212, 184, 150, 0.12);
            border-radius: 16px;
            padding: 28px 24px;
            margin-bottom: 20px;
            font-size: 0.92rem;
            line-height: 2.0;
            color: var(--text-secondary);
            white-space: pre-wrap;
            word-wrap: break-word;
            overflow-wrap: break-word;
            max-width: 100%;
            box-shadow: 0 6px 25px rgba(0, 0, 0, 0.35), inset 0 1px 0 rgba(212, 184, 150, 0.05);
            position: relative;
        }
        
        .ai-reading-content p {
            margin-bottom: 16px;
        }
        
        .ai-reading-content br {
            line-height: 2;
        }
        
        .ai-reading-content.streaming {
            border-color: rgba(212, 184, 150, 0.25);
            animation: pulse 2s ease-in-out infinite;
        }
        
        @keyframes pulse {
            0%, 100% { box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3); }
            50% { box-shadow: 0 4px 30px rgba(212, 184, 150, 0.2); }
        }
        
        .ai-loading {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            padding: 30px;
            color: var(--text-muted);
            font-size: 0.9rem;
            flex-direction: column;
        }
        
        .ai-loading-text {
            margin-top: 15px;
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            letter-spacing: 0.1em;
        }
        
        .ai-loading-dots {
            display: flex;
            gap: 6px;
        }
        
        .ai-loading-dots span {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--gold-primary);
            margin: 0 3px;
            animation: bounce 1.4s infinite ease-in-out both;
        }
        
        .ai-loading-dots span:nth-child(1) { animation-delay: -0.32s; }
        .ai-loading-dots span:nth-child(2) { animation-delay: -0.16s; }
        .ai-loading-dots span:nth-child(3) { animation-delay: 0s; }
        
        @keyframes bounce {
            0%, 80%, 100% { 
                transform: scale(0);
                opacity: 0.3;
            }
            40% { 
                transform: scale(1);
                opacity: 1;
                box-shadow: 0 0 20px rgba(212, 184, 150, 0.8);
            }
        }
        
        @keyframes glow {
            0%, 100% { filter: drop-shadow(0 0 20px rgba(212,184,150,0.4)); }
            50% { filter: drop-shadow(0 0 50px rgba(212,184,150,0.8)); }
        }
        
        @keyframes wave {
            0%, 100% { transform: translateY(0); opacity: 0.5; }
            50% { transform: translateY(-4px); opacity: 1; }
        }
        
        .loading-text-waves span {
            display: inline-block;
            animation: wave 1.2s infinite ease-in-out;
        }
        
        .loading-text-waves span:nth-child(1) { animation-delay: 0s; }
        .loading-text-waves span:nth-child(2) { animation-delay: 0.1s; }
        .loading-text-waves span:nth-child(3) { animation-delay: 0.2s; }
        
        .ai-loading-dots span:nth-child(2) { animation-delay: 0.2s; }
        .ai-loading-dots span:nth-child(3) { animation-delay: 0.4s; }
        
        @keyframes bounce {
            0%, 100% { transform: translateY(0); opacity: 0.4; }
            50% { transform: translateY(-10px); opacity: 1; }
        }
        
        .ai-retry-btn {
            background: transparent;
            border: 1px solid rgba(212, 184, 150, 0.3);
            border-radius: 8px;
            padding: 8px 16px;
            color: var(--text-muted);
            font-size: 0.85rem;
            cursor: pointer;
            margin-top: 15px;
            display: none;
            transition: all 0.3s;
        }
        
        .ai-retry-btn:hover {
            border-color: var(--gold-primary);
            color: var(--gold-light);
        }
        
        .ai-retry-btn.visible {
            display: inline-block;
        }

        .reading-header { text-align: center; margin-bottom: 30px; }

        .reading-title {
            font-family: 'Cinzel', serif;
            font-size: 1.4rem;
            color: var(--gold-light);
            letter-spacing: 0.12em;
            margin-bottom: 8px;
        }

        .reading-question { font-size: 0.8rem; color: var(--text-muted); }

        .reading-card {
            background: rgba(255,255,255,0.015);
            border: 1px solid rgba(212, 184, 150, 0.1);
            border-radius: 16px;
            padding: 20px 16px;
            margin-bottom: 16px;
        }

        .reading-card-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 14px;
            padding-bottom: 14px;
            border-bottom: 1px solid rgba(212, 184, 150, 0.08);
        }

        .reading-position {
            font-size: 0.75rem;
            color: #f5e6d8;
            font-weight: 600;
            padding: 3px 10px;
            background: rgba(212, 184, 150, 0.15);
            border-radius: 20px;
        }

        .reading-name { font-family: 'Cinzel', serif; font-size: 0.95rem; color: var(--gold-light); }

        .reading-orientation {
            margin-left: auto;
            font-size: 0.65rem;
            padding: 3px 10px;
            background: rgba(212, 184, 150, 0.12);
            border-radius: 20px;
            color: #f5e6c8;
        }

        .reading-content { font-size: 0.88rem; line-height: 1.85; color: var(--text-secondary); }

        .btn-restart {
            display: block;
            width: 100%;
            max-width: 260px;
            margin: 30px auto 0;
            padding: 13px;
            background: transparent;
            border: 1px solid rgba(212, 184, 150, 0.15);
            border-radius: 50px;
            color: var(--text-muted);
            font-family: 'Cormorant Garamond', serif;
            font-size: 0.9rem;
            letter-spacing: 0.12em;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-restart:hover { border-color: var(--gold-primary); color: var(--gold-light); }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

<body>
    <div class="bg-layer"></div>
    
    <div class="container">
        <header class="header">
            <h1 class="logo" onclick="goToInputPage()">零点塔罗</h1>
            <p class="tagline">MYSTERY · GENTLE · DIRECT</p>
        </header>

        <section class="input-section active" id="inputSection">
            <div class="input-wrapper">
                <p class="input-label">静下心来，默念你的问题</p>
                <p class="daily-limit-info">今日剩余免费次数：<span id="dailyRemaining">3</span>次</p>
                <textarea class="question-input" id="questionInput" rows="2" placeholder="我的感情运程如何？"></textarea>
            </div>
            <button class="btn-primary" id="startBtn">开始洗牌</button>
        </section>

        <section class="draw-section" id="drawSection">
            <div class="draw-header">
                <p class="draw-hint" style="font-size: 0.85rem;">点击牌面选中 1-3 张牌</p>
            </div>
            <div class="card-grid" id="cardGrid">
                <div class="cards-container" id="cardsContainer"></div>
            </div>
            <div class="selected-bar" id="selectedBar">
                <p class="selected-info">已选择 <span id="selectedCount">0</span>/3 张</p>
                <div class="selected-cards-row" id="selectedRow"></div>
                <button class="btn-draw" id="drawBtn" disabled>查看解读</button>
            </div>
        </section>

        <!-- AI 解读区域 -->
        <section class="reading-section" id="readingSection">
            <div class="reading-header">
                <h2 class="reading-title">塔罗解读</h2>
                <p class="reading-question" id="readingQuestion"></p>
            </div>
            <div id="readingContent"></div>
        </section>
        
        <!-- AI 深度解读区域（放在下面） -->
        <section class="ai-reading-section" id="aiReadingSection">
            <h2 class="ai-reading-title">✦ 综合总结 ✦</h2>
            <p class="ai-reading-question" id="aiReadingQuestion"></p>
            <div class="ai-reading-content" id="aiReadingContent">
                <div class="ai-loading">
                    <div class="ai-loading-dots"><span></span><span></span><span></span></div>
                    <span class="ai-loading-text">正在分析牌面...</span>
                </div>
            </div>
            <button class="ai-retry-btn" id="aiRetryBtn">重试</button>
            <button class="btn-restart" id="aiRestartBtn">重新抽牌</button>
        </section>
    </div>

    <script>
        // ==================== 配置区域 ====================
        const DEEPSEEK_API_KEY = 'sk-896cd9c0eb034de39dcbebab98b5c816';
        const API_ENDPOINT = 'https://api.deepseek.com/v1/chat/completions';
        const MODEL = 'deepseek-chat';
        
        // 检查是否管理员（先定义函数）
        function checkAdmin() {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get('admin') === 'tarot520admin';
        }
        
        // 管理员配置
        const isAdmin = checkAdmin(); // 检查是否管理员
        
        // 每日限制（管理员不受限）
        const DAILY_FREE_LIMIT = isAdmin ? 999999 : 3; // 管理员 999999 次，普通用户 3 次
        
        // 检查每日使用次数
        function checkDailyLimit() {
            if (isAdmin) {
                return { allowed: true, remaining: 999999 };
            }
            const today = new Date().toDateString();
            const lastVisit = localStorage.getItem('lastVisitDate');
            let count = parseInt(localStorage.getItem('dailyCount') || '0');
            
            if (lastVisit !== today) {
                localStorage.setItem('lastVisitDate', today);
                localStorage.setItem('dailyCount', '0');
                return { allowed: true, remaining: DAILY_FREE_LIMIT };
            }
            
            if (count >= DAILY_FREE_LIMIT) {
                return { allowed: false, remaining: 0, used: count };
            }
            
            return { allowed: true, remaining: DAILY_FREE_LIMIT - count, used: count };
        }
        
        // 管理员状态显示
        if (isAdmin) {
            console.log('👑 管理员模式：无限次数');
        }
        
        // 增加使用次数
        function incrementDailyCount() {
            const count = parseInt(localStorage.getItem('dailyCount') || '0');
            localStorage.setItem('dailyCount', String(count + 1));
        }
        
        // 更新显示
        function updateDailyLimitDisplay() {
            const limitCheck = checkDailyLimit();
            const el = document.getElementById('dailyRemaining');
            if (el) el.textContent = limitCheck.remaining;
        }
        
        // ==================== 精美卡背 ====================
        const cardBackSVG = `<svg viewBox="0 0 100 150" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <linearGradient id="bbg" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" style="stop-color:#0d0a18"/><stop offset="50%" style="stop-color:#080612"/><stop offset="100%" style="stop-color:#0d0a18"/>
                </linearGradient>
                <linearGradient id="bgl" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" style="stop-color:#f5e6c8"/><stop offset="50%" style="stop-color:#d4b896"/><stop offset="100%" style="stop-color:#a8885a"/>
                </linearGradient>
            </defs>
            <rect fill="url(#bbg)" width="100" height="150"/>
            <g fill="#f5e6c8" opacity="0.3">
                <circle cx="12" cy="18" r="0.4"/><circle cx="88" cy="22" r="0.4"/><circle cx="22" cy="128" r="0.4"/>
                <circle cx="78" cy="132" r="0.4"/><circle cx="10" cy="78" r="0.3"/><circle cx="90" cy="72" r="0.3"/>

            <rect x="7" y="7" width="86" height="136" rx="2" fill="none" stroke="url(#bgl)" stroke-width="0.3" opacity="0.3"/>
            <g transform="translate(50,75)" stroke="url(#bgl)" stroke-width="0.8" fill="none" opacity="0.6">
                <circle cx="0" cy="0" r="30" stroke-width="0.5"/><circle cx="0" cy="0" r="26" stroke-width="0.3"/>

        function toggleCard(cardEl, card) {
            if (cardEl.classList.contains('flipped')) return;
            const isSelected = cardEl.classList.contains('selected');
            if (isSelected) {
                cardEl.classList.remove('selected');
                selectedCards = selectedCards.filter(c => c !== card);
            } else {
                if (selectedCards.length >= 3) { alert('最多选择 3 张牌'); return; }
                cardEl.classList.add('selected');
                selectedCards.push(card);

        async function readStream(stream, onChunk, onComplete, onError) {
            const reader = stream.getReader();
            const decoder = new TextDecoder();
            let fullText = '';
            
            try {
                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    
                    const chunk = decoder.decode(value);
                    const lines = chunk.split('\n');
                    
                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            const data = line.slice(6);
                            if (data === '[DONE]') continue;
                            
                            try {
                                const json = JSON.parse(data);
                                const content = json.choices[0]?.delta?.content || '';
                                fullText += content;
                                onChunk(content);
                            } catch (e) {
                                // Ignore parse errors
                            }
                        }
                    }
                }
                onComplete(fullText);
            } catch (e) {
                onError(e);
            }
        }
